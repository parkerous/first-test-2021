# Netlify settings for the Binsu Star static site.
# Plain HTML/CSS/JS — no build step. Just publish the repo root as-is.
[build]
  publish = "."

# The Cloudflare Worker source, its config, and the api/ folder only run on
# Cloudflare — keep them off the public Netlify site.
[[redirects]]
  from = "/api-worker.js"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/wrangler.toml"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/api/*"
  to = "/index.html"
  status = 404
  force = true
